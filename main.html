<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PASCAL — SIG</title>
    <link rel="icon" href="img/seguraicon.ico" type="image/x-icon">

    <!-- Firebase compat (requerido para auth guard antes de que cargue ArcGIS) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <!-- ══ GUARD DE AUTENTICACIÓN ══
         Oculta el body hasta verificar sesión y disclaimer.
         Si el usuario no está logueado o no aceptó el disclaimer, redirige al login.
    -->
    <style>
        body { visibility: hidden; }
        body.authenticated { visibility: visible; }
    </style>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDFgK5NlW0BerFCwnnnzNqd_BOV2fRRoYI",
            authDomain: "geocrime-21267.firebaseapp.com",
            projectId: "geocrime-21267",
            storageBucket: "geocrime-21267.firebasestorage.app",
            messagingSenderId: "571718045211",
            appId: "1:571718045211:web:80966986ea339b3feb72be"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            const disclaimerOk = sessionStorage.getItem('disclaimerAccepted') === 'true';

            if (!user || !disclaimerOk) {
                // Sin sesión activa o sin disclaimer aceptado → volver al login
                window.location.replace('index.html');
            } else {
                // Sesión válida → mostrar la app
                document.body.classList.add('authenticated');
            }
        });

        // Cerrar sesión al cerrar/recargar la pestaña
        window.addEventListener('beforeunload', () => {
            auth.signOut();
            sessionStorage.removeItem('disclaimerAccepted');
        });
    </script>

    <!-- ══ DEPENDENCIAS ══ -->
    <script>
        window.dojoConfig = {
            async: true,
            packages: [{
                name: "js",
                location: location.pathname.replace(/\/[^/]+$/, "") + "/js"
            }]
        };
    </script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
