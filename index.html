<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso - SIGSEP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body,
        html {
            height: 100%;
            margin: 0;
        }

        .login-container {
            background: url('img/background.jpg') no-repeat center center;
            background-size: contain;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background-color: rgba(0, 0, 0, 0.5);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-box input {
            background-color: #fff;
            border-color: #ccc;
        }

        .login-box button {
            background-color: rgba(0, 0, 0, 0.8);
            border-color: rgba(0, 0, 0, 0.8);
        }

        .login-box button:hover {
            background-color: rgba(0, 0, 0, 1);
            border-color: rgba(0, 0, 0, 1);
        }

        .footer {
            position: absolute;
            bottom: 10px;
            right: 10px;
            font-size: 12px;
        }

        .logo {
            display: block;
            margin: 0 auto 20px;
            max-width: 200px;
        }

        #message {
            color: red;
            font-weight: bold;
            text-align: center;
        }

        .firebase-logo {
            display: block;
            margin: 1px auto;
            max-width: 150px;
        }

        .firebase-text {
            color: white;
            text-align: center;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>

<body>

    <div class="login-container">
        <div class="login-box">
            <img src="img/logosegura.png" alt="Logo" class="logo">
            <form id="loginForm">
                <div class="mb-3">
                    <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Usuario" required>
                </div>
                <div class="mb-3">
                    <input type="password" class="form-control" id="contraseña" name="contraseña"
                        placeholder="Contraseña" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Conectar</button>
                </div>
            </form>
            <div id="message"></div>
            <div class="text-center mt-3">
                <img src="img/firebase.png" alt="Firebase Logo" class="firebase-logo">
            </div>
        </div>
    </div>

    <div class="footer text-end">
        <p>Coordinación Técnica de Estadística y Datos</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js" type="module"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js" type="module"></script>
    
    <script type="module">
        // Importa las funciones necesarias
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCXjXEJcD202UFjU-ipFQynmrOVD7XyeSQ",
            authDomain: "admeaslogin.firebaseapp.com",
            projectId: "admeaslogin",
            storageBucket: "admeaslogin.firebasestorage.app",
            messagingSenderId: "908511765544",
            appId: "1:908511765544:web:38f6219260a59c37eb011d"
        };

        // Inicializa Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const loginForm = document.getElementById('loginForm');
        const usuarioInput = document.getElementById('usuario');
        const passwordInput = document.getElementById('contraseña');
        const messageDiv = document.getElementById('message');

        loginForm.addEventListener("submit", function (event) {
            event.preventDefault();

            const usuario = usuarioInput.value;
            const password = passwordInput.value;
            const fakeEmail = `${usuario}@hotmail.com`;

            signInWithEmailAndPassword(auth, fakeEmail, password)
                .then((userCredential) => {
                    console.log('Usuario autenticado:', userCredential.user.email);
                    window.location.href = "main.html";
                })
                .catch((error) => {
                    const errorCode = error.code;
                    let errorMessage = "Usuario o contraseña incorrectos.";

                    if (errorCode === 'auth/invalid-email') {
                        errorMessage = "El usuario no existe o el formato es incorrecto.";
                    } else if (errorCode === 'auth/user-disabled') {
                        errorMessage = "El usuario ha sido deshabilitado.";
                    } else if (errorCode === 'auth/user-not-found' || errorCode === 'auth/wrong-password') {
                        errorMessage = "Usuario o contraseña incorrectos.";
                    }

                    messageDiv.style.color = 'red';
                    messageDiv.textContent = errorMessage;
                    console.error('Error de autenticación:', error);
                });
        });
    </script>
</body>

</html>
